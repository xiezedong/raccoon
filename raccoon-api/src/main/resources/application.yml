spring:
  application:
    name: raccoon-api
  
  # 数据源配置（系统数据库，存储规则和日志）
  datasource:
    url: jdbc:postgresql://192.168.12.130:5432/raccoon
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 数据清洗配置（默认值，可在系统设置中覆盖）
data-cleaning:
  # 大模型配置（可在系统设置中配置）
  llm:
    api-url: https://api.openai.com/v1/chat/completions
    api-key: ${LLM_API_KEY:}
    model: gpt-4
    temperature: 0.3
    max-tokens: 2000
    timeout: 60000
    batch-size: 50

# 日志配置
logging:
  level:
    root: INFO
    com.raccoon.datacleaning: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

